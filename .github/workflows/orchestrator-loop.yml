name: orchestrator-loop
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  orchestrator-loop:
    if: |
      contains(github.event.comment.body, '/opencode orchestrator-loop') ||
      contains(github.event.comment.body, '/fl')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode Orchestrator Loop
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: ${{ vars.OPENCODE_MODEL || 'opencode/gpt-4o' }}
          agent: orchestrator
