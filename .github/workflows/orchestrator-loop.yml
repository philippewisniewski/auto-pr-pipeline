name: orchestrator-loop
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  orchestrator-loop:
    if: |
      (github.event_name == 'issue_comment' &&
       (contains(github.event.comment.body, '/opencode') ||
        contains(github.event.comment.body, '/oc'))) ||
      (github.event_name == 'pull_request_review_comment' &&
       (contains(github.event.comment.body, '/opencode') ||
        contains(github.event.comment.body, '/oc'))) ||
      github.event_name == 'issues' ||
      (github.event_name == 'pull_request' &&
       !startsWith(github.head_ref, 'opencode/'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git for safety
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode Orchestrator Loop
        id: opencode
        continue-on-error: true
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ vars.OPENCODE_MODEL || 'opencode/big-pickle' }}
          use_github_token: true
          prompt: >-
            ${{ github.event_name == 'issues' &&
               format('New issue #{0}: {1}', github.event.issue.number, github.event.issue.title) }}
            ${{ github.event_name == 'issue_comment' && github.event.comment.body }}
            ${{ github.event_name == 'pull_request' &&
               format('New PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) }}
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.body }}

      - name: Create Pull Request from pushed branch
        if: always() && steps.opencode.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          TITLE=$(head -1 .opencode/last-run/summary.md 2>/dev/null | sed 's/^# //' || echo "Automated changes")
          if [ -f .opencode/last-run/summary.md ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body-file .opencode/last-run/summary.md \
              --repo "${{ github.repository }}" || true
          fi
