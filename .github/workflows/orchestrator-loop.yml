name: orchestrator-loop
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  orchestrator-loop:
    if: |
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/opencode') ||
       contains(github.event.comment.body, '/oc')) ||
      github.event_name == 'pull_request_review_comment' &&
      (contains(github.event.comment.body, '/opencode') ||
       contains(github.event.comment.body, '/oc')) ||
      github.event_name == 'issues' ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode Orchestrator Loop
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ vars.OPENCODE_MODEL || 'gpt-5.4-nano' }}
          use_github_token: true
          prompt: >-
            ${{ github.event_name == 'issues' &&
               format('Triage issue #{0}: {1}', github.event.issue.number, github.event.issue.title) }}
            ${{ github.event_name == 'issue_comment' && github.event.comment.body }}
            ${{ github.event_name == 'pull_request' &&
               format('Review PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) }}
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.body }}

      - name: Read PR summary
        id: pr-summary
        run: |
          if [ -f .opencode/last-run/summary.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo 'title<<EOF'
              head -1 .opencode/last-run/summary.md | sed 's/^# //'
              echo EOF
            } >> "$GITHUB_OUTPUT"
            {
              echo 'branch<<EOF'
              jq -r '.branch // "chore/auto-pr"' .opencode/last-run/meta.json 2>/dev/null || echo "chore/auto-pr"
              echo EOF
            } >> "$GITHUB_OUTPUT"
            {
              echo 'commit_message<<EOF'
              jq -r '.commitMessage // "chore: automated changes"' .opencode/last-run/meta.json 2>/dev/null || echo "chore: automated changes"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.pr-summary.outputs.found == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ steps.pr-summary.outputs.commit_message }}
          title: ${{ steps.pr-summary.outputs.title }}
          body-path: .opencode/last-run/summary.md
          branch: ${{ steps.pr-summary.outputs.branch }}
          base: main
          delete-branch: true
